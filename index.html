<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartify</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
    <h1 class="logo">Cartify</h1>

    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Products</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
    </nav>  
    <section class="hero">

    <div class="hero-text">
        <h2>Smart Shopping Starts Here</h2>

        <p>
            Explore amazing products with the best prices.
        </p>

        <button>Shop Now</button>
    </div>

    </section>
    <section class="products">

    <h2>Featured Products</h2>

    <div class="product-container">

        <div class="card">
            <img src="images/headphone.jpg" alt="Product">
            <h3>Headphones</h3>
            <p>₹3000</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="images/swatch.jpg" alt="Product">
            <h3>Smart Watch</h3>
            <p>₹1500</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="images/shoe.jpg" alt="Product">
            <h3>Shoes</h3>
            <p>₹2000</p>
            <button>Add to Cart</button>
        </div>

    </div>

    </section>
    <section class="about">

    <h2>About Cartify</h2>

    <p>
        Cartify is a modern shopping platform.
    </p>

    </section>

</body>
<footer>

    <p>© 2026 Cartify. </p>

</footer>
</html>
